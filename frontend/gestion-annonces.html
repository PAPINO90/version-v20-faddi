<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des annonces FADIDI</title>
    <link rel="stylesheet" href="assets/css/boutique.css">
    <style>
    .modal {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
    }
    .modal.active {
        display: flex;
    }
    .edit-form {
        background: #fff;
        padding: 32px 24px;
        border-radius: 12px;
        box-shadow: 0 4px 24px #0005;
        min-width: 320px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
    }
        body { background: #181818; color: #fff; font-family: Arial, sans-serif; }
        h1 { color: #ffd000; text-align: center; margin-top: 24px; }
        table { width: 98%; margin: 24px auto; border-collapse: collapse; background: #232323; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #333; text-align: left; }
    th { background: #ff8c00; color: #232323; }
    th.page-cible-header { white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        .actions {
            display: flex;
            flex-direction: row;
            gap: 8px;
            align-items: center;
        }
        .actions button { background: #ff8c00; color: #232323; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-weight: bold; margin-right: 0; }
        .actions button.delete { background: #e74c3c; color: #fff; }
        .actions button:hover { background: #00b333; color: #fff; }
        .edit-form { background: #292929; padding: 18px; border-radius: 10px; margin: 18px auto; max-width: 420px; box-shadow: 0 2px 12px #0008; }
        .edit-form input, .edit-form textarea { width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 6px; border: none; background: #232323; color: #fff; }
        .edit-form label { font-weight: bold; color: #ffd000; }
    .edit-form button { background: #ff8c00; color: #232323; border: none; border-radius: 6px; padding: 8px 16px; font-weight: bold; cursor: pointer; }
    #edit-image-preview { cursor: pointer !important; }
        .edit-form button:hover { background: #00b333; color: #fff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }

        .fadidi-annonces-stats {
            display: flex;
            gap: 2em;
            margin: 0 auto 2em auto;
            flex-wrap: wrap;
            background: #232323;
            border-radius: 16px;
            box-shadow: 0 2px 12px #0006;
            padding: 18px 32px;
            max-width: 900px;
            justify-content: center;
        }
        .fadidi-annonces-stats div {
            font-size: 1.15em;
            font-weight: bold;
            color: #ffd000;
            margin: 0 8px;
            text-align: center;
        }
        .fadidi-annonces-stats span {
            color: #fff;
            font-size: 1.3em;
            font-weight: bold;
            margin-left: 6px;
            text-shadow: 0 1px 4px #000a;
        }

         #loader-annonces {
        text-align: center;
        margin: 40px auto;
        font-size: 1.3em;
        color: #ffd000;
    }
    .loader-spinner {
        display: inline-block;
        width: 32px;
        height: 32px;
        border: 4px solid #ffd000;
        border-top: 4px solid #232323;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        vertical-align: middle;
        margin-right: 12px;
    }
     #annonces-table-container {
        display: none;
    }
    </style>
</head>
<body>
    <h1>Gestion des annonces FADIDI</h1>
    <!-- Bloc Statistiques Annonces -->
    <div class="fadidi-annonces-stats">
        <div><strong>Total annonces :</strong> <span id="stat-total-annonces">0</span></div>
        <div><strong>Annonces actives :</strong> <span id="stat-annonces-actives">0</span></div>
        <div><strong>Total vues :</strong> <span id="stat-total-vues">0</span></div>
        <div><strong>Total clics :</strong> <span id="stat-total-clics">0</span></div>
    </div>
    <div id="loader-annonces">
        <span class="loader-spinner"></span>
        Chargement des annonces…
    </div>
   
    <div id="annonces-table-container"></div>
   
    <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <!-- Modal pour édition -->
    <div id="editModal" class="modal">
        <div class="edit-form" id="editFormContainer"></div>
    </div>

    <script>
    const API_URL = 'http://localhost:3000/api/annonces';

    // Charger et afficher toutes les annonces
    async function loadAnnonces() {
        const container = document.getElementById('annonces-table-container');
        const loader = document.getElementById('loader-annonces');
        // Affiche le loader et cache le tableau
        if (loader) loader.style.display = 'block';
        if (container) container.style.display = 'none';
        // Affiche le tableau vide dès le départ (pour accessibilité)
        container.innerHTML = `<div style="margin-bottom:16px;text-align:right;">
            <button id="deleteSelectedBtn" style="background:#e74c3c;color:#fff;padding:8px 18px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;">Supprimer la sélection</button>
            <button id="ajoutAnnonceBtn" style="background: #ff8c00;color:#fff;padding:8px 18px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;margin-left:10px;">Ajouter une annonce</button>
        </div>
    <table><thead><tr><th><input type="checkbox" id="selectAllAnnonces" /></th><th>ID</th><th>Titre</th><th>Description</th><th>Type</th><th>Aperçu</th><th class="page-cible-header">Page cible</th><th>Vues</th><th>Actions</th></tr></thead><tbody id="annonces-table-body"></tbody></table>`;
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('Erreur API');
            const annonces = await res.json();
            // Cache le loader et affiche le tableau
            if (loader) loader.style.display = 'none';
            if (container) container.style.display = 'block';
            if (!annonces.length) {
                container.innerHTML = '<p>Aucune annonce trouvée.</p>';
                return;
            }
            const tbody = document.getElementById('annonces-table-body');
            tbody.innerHTML = annonces.map(a => {
                let typeIcon = '';
                let previewHtml = '';
                if (Array.isArray(a.images) && a.images.length > 0) {
                    if (a.images[0].type === 'video') {
                        typeIcon = '🎬 Vidéo';
                        previewHtml = `<video src="${a.images[0].imageBase64}" style="width:70px;height:70px;object-fit:cover;border-radius:16px;background:#222;" muted autoplay playsinline loop></video>`;
                    } else {
                        typeIcon = '📷 Image';
                        previewHtml = `<img src="${a.images[0].imageBase64}" alt="Aperçu image" style="width:70px;height:70px;object-fit:cover;border-radius:16px;background:#222;" />`;
                    }
                } else {
                    typeIcon = '<span style="color:#888;">Inconnu</span>';
                    previewHtml = '<span style="color:#888;">Aucun média</span>';
                }
                return `
                <tr>
                    <td><input type="checkbox" class="annonce-checkbox" value="${a.id}" /></td>
                    <td>${a.id}</td>
                    <td>${a.titre}</td>
                    <td>${a.description}</td>
                    <td>${typeIcon}</td>
                    <td>${previewHtml}</td>
                    <td>${a.pageCible}</td>
                    <td><span title="Nombre de vues" style="vertical-align:middle;display:inline-block;width:20px;height:20px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" style="vertical-align:middle;fill:#ffd000;"><path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
                                            </span> ${a.vuesIndex || 0}</td>
                    <td class="actions">
                        <button class="edit-btn" data-id="${a.id}">Modifier</button>
                        <button class="delete delete-btn" data-id="${a.id}">Supprimer</button>
                        <button class="toggle-active toggle-btn" style="background:${a.active ? '#00b333' : '#888'};color:#fff;" data-id="${a.id}" data-active="${a.active}">${a.active ? 'Désactiver' : 'Activer'}</button>
                    </td>
                </tr>
                `;
            }).join('');
            // Réattache les gestionnaires d'événements
            tbody.querySelectorAll('.edit-btn').forEach(btn => {
                btn.onclick = function() {
                    incrementClicAnnonce(btn.dataset.id);
                    editAnnonce(Number(btn.dataset.id));
                };
            });
            tbody.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = function() {
                    incrementClicAnnonce(btn.dataset.id);
                    deleteAnnonce(Number(btn.dataset.id));
                };
            });
            tbody.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.onclick = function() {
                    incrementClicAnnonce(btn.dataset.id);
                    toggleAnnonceActive(Number(btn.dataset.id), btn.dataset.active === 'false');
                };
            });

            // Calcul statistiques annonces
            const totalAnnonces = annonces.length;
            const annoncesActives = annonces.filter(a => a.active).length;
            const totalVuesIndex = annonces.reduce((sum, a) => sum + (a.vuesIndex || 0), 0);
            const totalClicsIndex = annonces.reduce((sum, a) => sum + (a.clicsIndex || 0), 0);
            document.getElementById('stat-total-annonces').textContent = totalAnnonces;
            document.getElementById('stat-annonces-actives').textContent = annoncesActives;
            document.getElementById('stat-total-vues').textContent = totalVuesIndex;
            document.getElementById('stat-total-clics').textContent = totalClicsIndex;

            // Bouton ajout annonce
            document.getElementById('ajoutAnnonceBtn').addEventListener('click', function() {
                window.location.href = 'ajout-annonce.html';
            });

            // Sélectionner/désélectionner toutes les annonces
            document.getElementById('selectAllAnnonces').addEventListener('change', function(e) {
                document.querySelectorAll('.annonce-checkbox').forEach(cb => {
                    cb.checked = e.target.checked;
                });
            });

            // Bouton suppression groupée
            document.getElementById('deleteSelectedBtn').addEventListener('click', async function() {
                const checked = Array.from(document.querySelectorAll('.annonce-checkbox:checked')).map(cb => cb.value);
                if (!checked.length) {
                    alert('Sélectionnez au moins une annonce à supprimer.');
                    return;
                }
                if (!confirm(`Supprimer ${checked.length} annonce(s) sélectionnée(s) ?`)) return;
                let errors = [];
                for (const id of checked) {
                    try {
                        const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                        if (!res.ok) {
                            const errorText = await res.text();
                            errors.push(`ID ${id}: ${errorText}`);
                        }
                    } catch (err) {
                        errors.push(`ID ${id}: ${err.message}`);
                    }
                }
                if (errors.length) {
                    alert('Erreurs lors de la suppression:\n' + errors.join('\n'));
                } else {
                    alert('Suppression réussie !');
                }
                loadAnnonces();
            });
        } catch (err) {
            container.innerHTML = '<p style="color:#e74c3c;">Erreur lors du chargement des annonces.</p>';
        }
    }
    // Fonction pour incrémenter le compteur de clics
    function incrementClicAnnonce(id) {
        fetch(`${API_URL}/${id}/increment-clics`, { method: 'PATCH' });
    }
    window.incrementClicAnnonce = incrementClicAnnonce;

    // Supprimer une annonce
    async function deleteAnnonce(id) {
        if (!confirm('Supprimer cette annonce ?')) return;
        try {
            const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            if (!res.ok) {
                const errorText = await res.text();
                alert(`Erreur lors de la suppression (code ${res.status}): ${errorText}`);
                return;
            }
            // Supprimer la ligne du tableau sans recharger
            const row = document.querySelector(`input.annonce-checkbox[value="${id}"]`)?.closest('tr');
            if (row) row.remove();
            alert('Annonce supprimée !');
        } catch (err) {
            alert('Erreur JS lors de la suppression: ' + err.message);
        }
    }

    // Editer une annonce
    async function editAnnonce(id) {
        try {
            const res = await fetch(`${API_URL}`);
            if (!res.ok) throw new Error('Erreur API');
            const annonces = await res.json();
            const annonce = annonces.find(a => a.id === id);
            if (!annonce) return alert('Annonce introuvable');
            showEditForm(annonce);
        } catch (err) {
            alert('Erreur chargement annonce.');
        }
    }

    // Afficher le formulaire d'édition
    function showEditForm(annonce) {
        const modal = document.getElementById('editModal');
        const form = document.getElementById('editFormContainer');
        // Affichage de l'image ou vidéo existante (premier média)
        let mediaHtml = '';
        if (annonce.images && annonce.images.length) {
            const media = annonce.images[0];
            if (media.type === 'video' && media.imageBase64) {
                mediaHtml = `<div style='margin-bottom:10px;text-align:center;'>
                    <video id='edit-video-preview' src='${media.imageBase64}' controls style='max-width:220px;max-height:140px;border-radius:8px;box-shadow:0 2px 8px #0008;'></video><br><span style='color:#ffd000;'>Vidéo actuelle</span></div>`;
            } else if (media.imageBase64) {
                mediaHtml = `<div style='margin-bottom:10px;text-align:center;'>
                    <img id='edit-image-preview' src='${media.imageBase64}' alt='Image actuelle' style='max-width:180px;max-height:120px;border-radius:8px;box-shadow:0 2px 8px #0008;cursor:pointer;'/><br><span style='color:#ffd000;'>Image actuelle</span></div>`;
            }
        }
        form.innerHTML = `
            <h2>Modifier l'annonce</h2>
            ${mediaHtml}
            <label>Remplacer l'image</label>
            <input type="file" id="edit-image" accept="image/*" />
            <label>Ajouter une vidéo</label>
            <input type="file" id="edit-video" accept="video/*" />
            <label>Titre</label>
            <input type="text" id="edit-titre" value="${annonce.titre}" />
            <label>Description</label>
            <textarea id="edit-description">${annonce.description}</textarea>
            <label>Type</label>
            <input type="text" id="edit-type" value="${annonce.type}" />
            <label>Page cible</label>
            <input type="text" id="edit-pageCible" value="${annonce.pageCible}" />
            <label>Redirection URL</label>
            <input type="text" id="edit-redirectionUrl" value="${annonce.redirectionUrl || ''}" />
            <div style="margin-top:12px;text-align:right;">
                <button id="edit-save-btn">Enregistrer</button>
                <button onclick="closeModal()" style="background:#e74c3c;color:#fff;">Annuler</button>
            </div>
        `;
        // Empêche le rechargement de la page lors de l'enregistrement
        setTimeout(function() {
            document.getElementById('edit-save-btn').onclick = function(e) {
                e.preventDefault();
                submitEdit(annonce.id);
            };
        }, 0);
        // Ajout du script de redirection sur clic image
        setTimeout(function() {
            var img = document.getElementById('edit-image-preview');
            if (img) {
                img.addEventListener('click', function() {
                    var url = document.getElementById('edit-redirectionUrl').value.trim();
                    if (url) {
                        if (/^https?:\/\//.test(url)) {
                            window.open(url, '_blank');
                        } else {
                            if (url === 'boutique') url = 'boutique.html';
                            if (url === 'promotion') url = 'promotion.html';
                            window.location.href = url;
                        }
                    }
                });
            }
        }, 100);
    modal.classList.add('active');
    modal.style.display = 'flex';
    }

    // Soumettre la modification
    async function submitEdit(id) {
        const dto = {
            titre: document.getElementById('edit-titre').value,
            description: document.getElementById('edit-description').value,
            type: document.getElementById('edit-type').value,
            pageCible: document.getElementById('edit-pageCible').value,
            redirectionUrl: document.getElementById('edit-redirectionUrl').value
        };
        // Gestion du remplacement d'image ou ajout vidéo
        const imageInput = document.getElementById('edit-image');
        const videoInput = document.getElementById('edit-video');
        if (videoInput && videoInput.files && videoInput.files[0]) {
            const file = videoInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                dto.images = [{
                    titre: 'Vidéo modifiée',
                    description: 'Vidéo modifiée',
                    type: 'video',
                    imageBase64: base64
                }];
                await sendEditRequest(id, dto);
            };
            reader.readAsDataURL(file);
        } else if (imageInput && imageInput.files && imageInput.files[0]) {
            const file = imageInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                dto.images = [{
                    titre: 'Image modifiée',
                    description: 'Image modifiée',
                    type: 'image',
                    imageBase64: base64
                }];
                await sendEditRequest(id, dto);
            };
            reader.readAsDataURL(file);
        } else {
            await sendEditRequest(id, dto);
        }
    }

    async function sendEditRequest(id, dto) {
        try {
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dto)
            });
            if (!res.ok) throw new Error('Erreur API');
            alert('Annonce modifiée !');
            closeModal();
            // Mettre à jour la ligne du tableau sans recharger toute la liste
            const row = document.querySelector(`input.annonce-checkbox[value="${id}"]`)?.closest('tr');
            if (row) {
                row.children[2].textContent = dto.titre;
                row.children[3].textContent = dto.description;
                row.children[4].textContent = dto.type;
                row.children[5].textContent = dto.pageCible;
            }
        } catch (err) {
            alert('Erreur lors de la modification.');
        }
    }

    function closeModal() {
    const modal = document.getElementById('editModal');
    modal.classList.remove('active');
    modal.style.display = 'none';
    }

    // Changer l'état actif d'une annonce
    async function toggleAnnonceActive(id, newState) {
        try {
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ active: Boolean(newState) })
            });
            if (!res.ok) {
                alert('Erreur lors du changement d\'état');
                return;
            }
            // Mettre à jour le bouton d'état sans recharger
            const row = document.querySelector(`input.annonce-checkbox[value="${id}"]`)?.closest('tr');
            if (row) {
                const btn = row.querySelector('.toggle-active');
                if (btn) {
                    btn.textContent = newState ? 'Désactiver' : 'Activer';
                    btn.style.background = newState ? '#00b333' : '#888';
                    btn.setAttribute('onclick', `incrementClicAnnonce(${id}); toggleAnnonceActive(${id}, ${!newState})`);
                }
            }
        } catch (err) {
            alert('Erreur JS: ' + err.message);
        }
    }

    // Initialisation
    window.onload = loadAnnonces;
    window.editAnnonce = editAnnonce;
    window.deleteAnnonce = deleteAnnonce;
    window.submitEdit = submitEdit;
    window.closeModal = closeModal;
    </script>
</body>
</html>
